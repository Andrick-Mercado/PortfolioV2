<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>PersonalPortfolio</title>
    <base href="/"/>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet"/>
    <script>
        // Initialize theme before Blazor renders to prevent flash of incorrect theme
        (function() {
            const preferencesKey = 'Preferences';
            try {
                const preferences = localStorage.getItem(preferencesKey);
                if (preferences) {
                    const prefs = JSON.parse(preferences);
                    console.log(prefs);
                    if (prefs.darkMode) {
                        // Add dark mode marker to html element so MudBlazor can apply dark theme
                        document.documentElement.setAttribute('data-theme-initialized', 'true');
                        document.documentElement.setAttribute('data-dark-mode', 'true');
                    }
                }
            } catch (e) {
                // Silently fail if localStorage is not accessible
                console.warn('Theme initialization failed:', e);
            }
        })();
    </script>
</head>

<body>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
